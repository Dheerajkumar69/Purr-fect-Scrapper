[pytest]
# Run async tests in strict mode — prevents accidental bare async def tests
asyncio_mode = strict

# Suppress the pytest-asyncio deprecation about unset fixture loop scope
asyncio_default_fixture_loop_scope = function

# Show local variables on failure; deselect live (network-hitting) tests by default
addopts = --tb=short -m "not live"

# Custom markers
markers =
    live: Live network integration tests (deselect with -m 'not live')

# Suppress third-party library deprecation warnings outside our control
filterwarnings =
    ignore::DeprecationWarning:bs4

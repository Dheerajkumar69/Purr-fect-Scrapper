services:
  # ---------------------------------------------------------------------------
  # Scraper API — FastAPI application with built-in job queue
  # ---------------------------------------------------------------------------
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: universalscraper:latest
    container_name: scraper
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - scraper_output:/app/output        # persistent reports, raw captures, logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - SCRAPER_OUTPUT_DIR=/app/output
      # Max concurrent scrape jobs (default 4)
      # - MAX_CONCURRENT_JOBS=4
      # Max queued jobs (default 200)
      # - MAX_QUEUED_JOBS=200
      # Per-domain rate limit (default 2 req/s)
      # - DEFAULT_DOMAIN_RPS=2.0
      # Total job timeout in seconds (default 300)
      # - MAX_JOB_TIMEOUT_S=300
      # Proxy pool: comma-separated proxy URLs (optional)
      # - SCRAPER_PROXIES=http://user:pass@proxy1:8080,http://proxy2:8080
      # AI engine toggle
      # - AI_SCRAPER_ENABLED=0
      # Confidence gate threshold (0–1); trigger JS re-scrape below this value
      # - CONFIDENCE_RESCRAPE_THRESHOLD=0.35
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Optional: lightweight reverse proxy for TLS termination in production
  # nginx:
  #   image: nginx:stable-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - scraper

volumes:
  scraper_output:
